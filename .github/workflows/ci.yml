name: spec-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  spec-lint:
    name: zsh syntax + markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install zsh
        run: sudo apt-get update -q && sudo apt-get install -y -q zsh

      - name: zsh -n on shell configs
        run: |
          set -euo pipefail
          for f in configs/zsh/.zshenv configs/zsh/.zprofile configs/zsh/.zshrc; do
            zsh -n "$f"
            echo "ok: $f"
          done

      - name: markdownlint
        run: npx --yes markdownlint-cli2@0.18.1 "**/*.md"
